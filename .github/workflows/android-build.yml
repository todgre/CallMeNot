name: Build & Release AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: CallMeNot
        run: chmod +x gradlew

      - name: Decode release keystore
        run: |
          mkdir -p $GITHUB_WORKSPACE/CallMeNot/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/CallMeNot/app/keystore/release.keystore
          echo "KEYSTORE_ABSOLUTE=$GITHUB_WORKSPACE/CallMeNot/app/keystore/release.keystore" >> $GITHUB_ENV

      - name: Verify keystore exists
        run: |
          echo "Keystore path: $KEYSTORE_ABSOLUTE"
          ls -la $KEYSTORE_ABSOLUTE
          keytool -list -keystore $KEYSTORE_ABSOLUTE -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -noprompt 2>&1 | head -10

      - name: Build signed release AAB
        working-directory: CallMeNot
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_ABSOLUTE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: callmenot-release-${{ github.run_number }}
          path: CallMeNot/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
