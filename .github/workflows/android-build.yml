name: Build & Release AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        working-directory: CallMeNot
        run: chmod +x gradlew

      - name: Decode release keystore
        run: |
          mkdir -p CallMeNot/app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > CallMeNot/app/keystore/release.keystore

      - name: Build signed release AAB
        working-directory: CallMeNot
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: callmenot-release-${{ github.run_number }}
          path: CallMeNot/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
