name: (Run Once) Generate Release Keystore

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and credentials
        run: |
          KEYSTORE_PASSWORD=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 32)
          KEY_ALIAS="callmenot"

          keytool -genkey -v \
            -keystore release.keystore \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEYSTORE_PASSWORD" \
            -dname "CN=CallMeNot, OU=AppsStudioHQ, O=AppsStudioHQ, L=Unknown, S=Unknown, C=US"

          KEYSTORE_BASE64=$(base64 -w 0 release.keystore)

          cat > keystore-credentials.txt << EOF
          =============================================
          CALLMENOT RELEASE KEYSTORE CREDENTIALS
          Save this file in a password manager or safe location.
          You will NEVER be able to update your app without these.
          =============================================

          Add these 4 values as GitHub Secrets:
          (Repo Settings > Secrets and variables > Actions > New repository secret)

          Secret name:  KEYSTORE_BASE64
          Secret value:
          $KEYSTORE_BASE64

          Secret name:  KEYSTORE_PASSWORD
          Secret value:
          $KEYSTORE_PASSWORD

          Secret name:  KEY_ALIAS
          Secret value:
          $KEY_ALIAS

          Secret name:  KEY_PASSWORD
          Secret value:
          $KEYSTORE_PASSWORD

          =============================================
          AFTER ADDING SECRETS:
          - Go to Actions tab > Build & Release AAB > Run workflow
          - Wait ~10 min, download the artifact (app-release.aab)
          - Upload that file to Google Play Console
          =============================================
          EOF

          echo "Done. Download the artifact below."

      - name: Upload credentials artifact
        uses: actions/upload-artifact@v4
        with:
          name: KEYSTORE-CREDENTIALS-SAVE-THEN-DELETE
          path: keystore-credentials.txt
          retention-days: 1
